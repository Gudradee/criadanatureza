<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Financeiro — CDN</title>
  <link rel="stylesheet" href="/static/css/base.css" />
  <link rel="stylesheet" href="/static/css/layout.css" />
  <link rel="stylesheet" href="/static/css/components.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="shell">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🌿</div>
      <div class="logo-text">
        <span class="logo-title">CDN</span>
        <span class="logo-sub">Cria da Natureza</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a href="/" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard</a>
      <a href="/estoque.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>Estoque</a>
      <a href="/parceiros.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>Parceiros</a>
      <a href="/financeiro.html" class="nav-item active"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>Financeiro</a>
      <a href="/configuracoes.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/></svg>Configurações</a>
      <a href="/apresentacao-landings.html" class="nav-item"><svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>Apresentação</a>
    </nav>
    <div class="sidebar-footer"><p class="sidebar-version">CDN v1.0 · 2025</p></div>
  </aside>

  <div class="sidebar-overlay overlay" id="sidebarOverlay"></div>

  <div class="main-wrapper">
    <header class="topbar">
      <button class="sidebar-toggle btn btn-ghost btn-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="topbar-left">
        <h1 class="page-title">Financeiro</h1>
        <span class="page-subtitle">Fluxo de caixa e transações</span>
      </div>
      <div class="topbar-right">
        <button class="btn btn-secondary btn-sm" onclick="abrirModal('saida')">− Registrar saída</button>
        <button class="btn btn-primary btn-sm" onclick="abrirModal('entrada')">+ Registrar entrada</button>
      </div>
    </header>

    <main class="page-content">

      <!-- KPIs -->
      <div class="grid-3" style="margin-bottom:var(--sp-8)">
        <div class="kpi-card" style="--kpi-accent:var(--c-green);--kpi-icon-bg:#f0faf5;--kpi-icon-color:#059669">
          <div class="kpi-header">
            <span class="kpi-label">Total de entradas</span>
            <div class="kpi-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/></svg></div>
          </div>
          <div class="kpi-value" id="fin-entradas">—</div>
          <div class="kpi-footer" id="fin-mes-entradas">Mês: —</div>
        </div>

        <div class="kpi-card" style="--kpi-accent:var(--c-danger);--kpi-icon-bg:#fef2f2;--kpi-icon-color:#dc2626">
          <div class="kpi-header">
            <span class="kpi-label">Total de saídas</span>
            <div class="kpi-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/></svg></div>
          </div>
          <div class="kpi-value" id="fin-saidas">—</div>
          <div class="kpi-footer" id="fin-mes-saidas">Mês: —</div>
        </div>

        <div class="kpi-card" style="--kpi-accent:var(--c-teal);--kpi-icon-bg:var(--c-teal-light);--kpi-icon-color:var(--c-teal)">
          <div class="kpi-header">
            <span class="kpi-label">Lucro estimado</span>
            <div class="kpi-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg></div>
          </div>
          <div class="kpi-value" id="fin-lucro">—</div>
          <div class="kpi-footer" id="fin-mes-lucro">Mês: —</div>
        </div>
      </div>

      <!-- Filtros + tabela -->
      <div class="section-header">
        <h2 class="section-title">Transações</h2>
        <div style="display:flex;gap:var(--sp-2)">
          <button class="btn btn-ghost btn-sm" onclick="filtrar('todos')" id="f-todos" style="color:var(--c-teal);font-weight:600">Todas</button>
          <button class="btn btn-ghost btn-sm" onclick="filtrar('entrada')" id="f-entrada">Entradas</button>
          <button class="btn btn-ghost btn-sm" onclick="filtrar('saida')" id="f-saida">Saídas</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Tipo</th>
              <th>Descrição</th>
              <th>Categoria</th>
              <th>Data</th>
              <th style="text-align:right">Valor</th>
              <th style="width:60px"></th>
            </tr>
          </thead>
          <tbody id="fin-tbody">
            <tr><td colspan="6" class="loading-state"><div class="spinner"></div></td></tr>
          </tbody>
        </table>
      </div>

    </main>
  </div>
</div>

<!-- Modal: Nova transação -->
<div class="modal-backdrop" id="modal-transacao">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-fin-title">Nova entrada</h2>
      <button class="modal-close" onclick="closeModal('modal-transacao')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="fin-tipo" />
      <div class="form-group">
        <label class="form-label required">Descrição</label>
        <input class="form-input" id="fin-descricao" placeholder="Ex: Venda direta, compra de matéria-prima..." />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label required">Valor (R$)</label>
          <input class="form-input" id="fin-valor" type="number" min="0.01" step="0.01" placeholder="0,00" />
        </div>
        <div class="form-group">
          <label class="form-label">Categoria</label>
          <input class="form-input" id="fin-categoria" placeholder="Ex: Venda, Fornecedor..." />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Data</label>
        <input class="form-input" id="fin-data" type="date" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('modal-transacao')">Cancelar</button>
      <button class="btn btn-primary" id="btn-salvar-fin" onclick="salvarTransacao()">Salvar</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="/static/js/api.js"></script>
<script src="/static/js/financeiro.js"></script>
</body>
</html>
